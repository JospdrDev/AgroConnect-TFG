<app-navbar></app-navbar>

<div class="card p-5 shadow-2 border-round-xl mx-6 my-4 lg:mx-8"> 
  <div class="flex align-items-center justify-content-between mb-4">
      <h2 class="m-0 text-primary" style="padding: 10px;">
          <span><i class="pi pi-map mr-2 text-3xl"></i></span> Mis Parcelas Agrícolas
      </h2>
      <p-button label="Nueva Finca" icon="pi pi-plus" severity="success" [raised]="true"></p-button>
  </div>
  <p-table #dt [value]="fincas" [rows]="6" [paginator]="true" 
           [globalFilterFields]="['nombre', 'cultivo']" [loading]="loading"
           [rowHover]="true" styleClass="p-datatable-gridlines w-full"
           [showCurrentPageReport]="true"
           currentPageReportTemplate="Mostrando {first} a {last} de {totalRecords} fincas">
    
    <ng-template pTemplate="caption">
      <div class="flex justify-content-end">
          <p-iconField iconPosition="left">
              <p-inputIcon styleClass="pi pi-search"></p-inputIcon>
              <input pInputText type="text" (input)="dt.filterGlobal($any($event.target).value, 'contains')" placeholder="Buscar..." />
          </p-iconField>
      </div>
    </ng-template>

    <ng-template pTemplate="header">
      <tr>
          <th pSortableColumn="nombre" style="width: 35%; padding: 1rem 1.5rem;">
            Nombre <p-sortIcon field="nombre"></p-sortIcon>
          </th>
          <th pSortableColumn="cultivo" style="width: 25%; padding: 1rem 1.5rem;">
            Cultivo <p-sortIcon field="cultivo"></p-sortIcon>
          </th>
          <th pSortableColumn="hectareas" style="width: 20%; padding: 1rem 1.5rem;">
            Extensión <p-sortIcon field="hectareas"></p-sortIcon>
          </th>
          <th style="width: 20%; padding: 1rem 1.5rem;" class="text-right">Acciones</th> 
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-finca>
      <tr>
        <td class="font-bold" style="padding: 1rem 1.5rem;">{{finca.nombre}}</td>
        <td style="padding: 1rem 1.5rem;">
            <p-tag [value]="finca.cultivo" severity="secondary"></p-tag>
        </td>
        <td style="padding: 1rem 1.5rem;">{{finca.hectareas}} ha</td>
        <td style="padding: 0.5rem 1.5rem;">
          <div class="flex gap-2 justify-content-end">
            <p-button icon="pi pi-pencil" [rounded]="true" [text]="true" [severity]="'warn'"></p-button>
            <p-button icon="pi pi-trash" [rounded]="true" [text]="true" [severity]="'danger'"></p-button>
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
</div>
